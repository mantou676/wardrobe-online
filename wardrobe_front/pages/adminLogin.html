<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上衣橱-后台登录</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/request.js"></script>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {background:#e8f4ff;}
        .login-box {
            width: 420px;
            margin: 120px auto;
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow: 0 0 12px #cce0f5;
        }
        h2 {text-align:center;margin-bottom:30px;color:#1677cb;}
        .item {margin-bottom:20px;}
        .item label {display:block;margin-bottom:6px;font-size:15px;color:#333;}
        .item input {
            width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:4px;font-size:15px;
        }
        .login-btn {
            width:100%;padding:11px;background:#1677cb;color:#fff;border:none;border-radius:4px;font-size:16px;cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>网上衣橱 后台管理登录</h2>
        <div class="item">
            <label>账号</label>
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="item">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button class="login-btn" onclick="adminLogin()">登录</button>
    </div>

    <script>
        async function adminLogin(){
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            if(!username || !password){
                alert("账号密码不能为空");
                return;
            }
            try{
                const res = await request.post("/login",{username,password});
                if(res.code !== 200){
                    alert(res.msg);
                    return;
                }
                const user = res.data.user;
                // 权限判断：role=1管理员放行，普通用户禁止后台
                if(user.role !== 1){
                    alert("您没有权限！");
                    return;
                }
                // 存储登录信息
                localStorage.setItem("adminId",user.id);
                localStorage.setItem("adminName",user.username);
                localStorage.setItem("token",res.data.token);
                alert(user.username+"登录成功！");
                location.href = "./adminIndex.html";
            }catch(e){
                alert("登录请求异常");
                console.error(e);
            }
        }
    </script>
</body>
</html>
