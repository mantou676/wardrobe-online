<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上衣橱 - 后台 - 服装管理</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/request.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #05070a; color: #e0e6f0; height: 100vh; overflow: hidden; }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at center, #1a1f2c 0%, #05070a 100%); }

        .top-bar {
            position: relative; z-index: 10;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            background: rgba(5,7,10,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .top-bar .brand { background: linear-gradient(135deg, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: bold; font-size: 17px; letter-spacing: 1px; }
        .admin-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(79,172,254,0.2); color: #4facfe; border: 1px solid rgba(79,172,254,0.3); }
        .top-bar a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; margin-left: 10px; transition: 0.3s; }
        .top-bar a:hover { color: #f87171; }

        .container { position: relative; z-index: 5; display: flex; height: calc(100vh - 60px); }
        .sidebar {
            width: 200px; padding: 20px 0; flex-shrink: 0;
            background: rgba(255,255,255,0.02); border-right: 1px solid rgba(255,255,255,0.05);
        }
        .menu-item {
            height: 46px; line-height: 46px; padding-left: 28px; cursor: pointer; font-size: 14px;
            color: rgba(255,255,255,0.55); transition: 0.3s; border-left: 3px solid transparent;
        }
        .menu-item:hover { color: #e0e6f0; background: rgba(79,172,254,0.05); }
        .menu-item.active { color: #4facfe; background: rgba(79,172,254,0.08); border-left-color: #4facfe; }

        .main { flex: 1; padding: 24px; overflow-y: auto; }

        .search-box {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            padding: 16px 20px; margin-bottom: 20px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
        }
        .search-box input, .search-box select {
            padding: 8px 14px; font-size: 13px; border-radius: 6px; min-width: 160px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.12); color: #e0e6f0; outline: none;
        }
        .search-box select option { background: #1a1f2c; color: #e0e6f0; }
        .search-box input:focus, .search-box select:focus { border-color: #4facfe; }
        .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .btn-search { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; }
        .btn-search:hover { box-shadow: 0 4px 14px rgba(79,172,254,0.4); }
        .btn-reset { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); }
        .btn-reset:hover { background: rgba(255,255,255,0.12); }
        .btn-add { background: linear-gradient(135deg, #34d399, #10b981); color: #fff; margin-left: auto; }
        .btn-add:hover { box-shadow: 0 4px 14px rgba(52,211,153,0.4); }

        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        th, td { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 11px 10px; text-align: center; font-size: 13px; }
        th { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5); font-weight: 500; }
        td img { width: 50px; height: 50px; object-fit: contain; border-radius: 4px; cursor: zoom-in; }
        .btn-edit { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; background: rgba(79,172,254,0.2); color: #4facfe; margin-right: 6px; transition: 0.3s; }
        .btn-edit:hover { background: #4facfe; color: #fff; }
        .btn-del { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; background: rgba(248,113,113,0.2); color: #f87171; transition: 0.3s; }
        .btn-del:hover { background: #f87171; color: #fff; }

        .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: center; justify-content: center; }
        .dialog { width: 460px; padding: 28px; background: #151925; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .dialog h3 { margin-bottom: 18px; text-align: center; font-weight: 500; letter-spacing: 1px; }
        .dialog-row { margin-bottom: 14px; }
        .dialog-row label { display: block; margin-bottom: 5px; font-size: 12px; color: rgba(255,255,255,0.5); }
        .dialog-row input, .dialog-row select { width: 100%; padding: 9px 12px; font-size: 13px; border-radius: 6px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.12); color: #e0e6f0; outline: none; }
        .dialog-row select option { background: #151925; }
        .img-preview { width: 120px; height: 120px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; margin: 6px 0; object-fit: contain; }
        .dialog-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
        .btn-cancel { padding: 8px 18px; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; cursor: pointer; background: transparent; color: rgba(255,255,255,0.6); }
        .btn-submit { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; font-weight: bold; }

        .img-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; cursor: zoom-out; }
        .img-mask img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .img-mask .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 36px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="top-bar">
        <span class="brand">✦ 网上衣橱 · 后台管理</span>
        <div class="admin-info">
            <div class="avatar" id="adminAvatar">A</div>
            <span id="adminName">admin</span>
            <a href="javascript:logout()">退出</a>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div class="menu-item" onclick="jump('adminIndex.html')">首页</div>
            <div class="menu-item active" onclick="jump('clothesAdmin.html')">服装管理</div>
            <div class="menu-item" onclick="jump('orderAdmin.html')">订单管理</div>
            <div class="menu-item" onclick="jump('userAdmin.html')">用户管理</div>
        </div>
        <div class="main">
            <div class="search-box">
                <input type="text" id="searchName" placeholder="请输入服装名称">
                <select id="typeSel"><option value="">请选择服装类别</option></select>
                <select id="styleSel"><option value="">请选择服装风格</option></select>
                <button class="btn btn-search" onclick="loadClothes()">搜索</button>
                <button class="btn btn-reset" onclick="resetSearch()">重置</button>
                <button class="btn btn-add" onclick="openAddDialog()">＋ 上架服装</button>
            </div>
            <table>
                <thead>
                    <tr><th>编号</th><th>服装名称</th><th>图片</th><th>尺码</th><th>类别</th><th>风格</th><th>价格</th><th>操作</th></tr>
                </thead>
                <tbody id="clothTbody"></tbody>
            </table>
        </div>
    </div>

    <div class="img-mask" id="imgMask" onclick="closeImg()">
        <span class="close-btn">&times;</span>
        <img id="bigImg" src="">
    </div>

    <div class="mask" id="dialogMask">
        <div class="dialog">
            <h3 id="dialogTitle">上架服装</h3>
            <input type="hidden" id="editId">
            <div class="dialog-row"><label>*服装名称</label><input type="text" id="clothName"></div>
            <div class="dialog-row"><label>*服装类别</label><select id="dialogType"></select></div>
            <div class="dialog-row"><label>*服装风格</label><input type="text" id="dialogStyle"></div>
            <div class="dialog-row">
                <label>图片</label>
                <input type="file" id="imgFile" accept="image/*" onchange="previewImg()">
                <img class="img-preview" id="preImg">
                <input type="hidden" id="imgName">
            </div>
            <div class="dialog-row"><label>*服装价格</label><input type="number" step="0.01" id="clothPrice"></div>
            <div class="dialog-btns">
                <button class="btn-cancel" onclick="closeDialog()">取消</button>
                <button class="btn-submit" onclick="saveClothes()">提交</button>
            </div>
        </div>
    </div>

    <script>
        var adminId = localStorage.getItem("adminId");
        var token = localStorage.getItem("token");
        var typeList = [], clothList = [];

        window.onload = async function(){
            if(!adminId || !token){ alert("请登录管理员账号"); location.href = "./adminLogin.html"; return; }
            var n = localStorage.getItem("adminName");
            document.getElementById("adminName").innerText = n;
            document.getElementById("adminAvatar").innerText = n.substring(0,1);
            await loadTypeAndStyle();
            await loadClothes();
        }

        async function loadTypeAndStyle(){
            var typeRes = await request.get("/allTypes");
            if(typeRes.code===200) typeList = typeRes.data;
            var typeSel = document.getElementById("typeSel");
            var dialogType = document.getElementById("dialogType");
            typeList.forEach(function(t){
                typeSel.innerHTML += '<option value="'+t.typeName+'">'+t.typeName+'</option>';
                dialogType.innerHTML += '<option value="'+t.id+'">'+t.typeName+'</option>';
            });
        }

        async function loadClothes(){
            var name = document.getElementById("searchName").value.trim();
            var type = document.getElementById("typeSel").value;
            var style = document.getElementById("styleSel").value;
            var tbody = document.getElementById("clothTbody"); tbody.innerHTML = "";
            var res = await request.get("/allClothes",{params:{style:style,type:type}});
            if(res.code!==200){ alert(res.msg); return; }
            clothList = res.data;
            clothList.forEach(function(item){
                var sizeStr = (item.sizeList && item.sizeList.length) ? item.sizeList.map(function(s){return s.sizeName}).join(" ") : "";
                tbody.innerHTML +=
                    '<tr>' +
                    '<td>'+item.id+'</td>' +
                    '<td>'+item.clothName+'</td>' +
                    '<td><img src="../images/'+item.image+'" onclick="event.stopPropagation();openImg(\'../images/'+item.image+'\')"></td>' +
                    '<td>'+sizeStr+'</td>' +
                    '<td>'+item.typeName+'</td>' +
                    '<td>'+item.style+'</td>' +
                    '<td>¥'+item.price+'</td>' +
                    '<td><button class="btn-edit" onclick="openEdit('+item.id+')">编辑</button><button class="btn-del" onclick="delCloth('+item.id+')">删除</button></td>' +
                    '</tr>';
            });
        }

        async function previewImg(){
            var file = document.getElementById("imgFile").files[0];
            if(!file) return;
            var formData = new FormData(); formData.append("clothesImage", file);
            var uploadRes = await axios.post("http://localhost:8080/wardrobe_back/uploadFile", formData);
            document.getElementById("imgName").value = uploadRes.data;
            document.getElementById("preImg").src = "../images/"+uploadRes.data;
        }

        function openAddDialog(){
            document.getElementById("dialogTitle").innerText = "上架服装";
            document.getElementById("editId").value = "";
            document.getElementById("clothName").value = "";
            document.getElementById("dialogStyle").value = "";
            document.getElementById("clothPrice").value = "";
            document.getElementById("imgName").value = "";
            document.getElementById("preImg").src = "";
            document.getElementById("dialogMask").style.display = "flex";
        }

        function openEdit(id){
            var data = clothList.find(function(c){return c.id===id});
            document.getElementById("dialogTitle").innerText = "编辑服装";
            document.getElementById("editId").value = id;
            document.getElementById("clothName").value = data.clothName;
            document.getElementById("dialogType").value = data.typeId;
            document.getElementById("dialogStyle").value = data.style;
            document.getElementById("clothPrice").value = data.price;
            document.getElementById("imgName").value = data.image;
            document.getElementById("preImg").src = "../images/"+data.image;
            document.getElementById("dialogMask").style.display = "flex";
        }

        function closeDialog(){ document.getElementById("dialogMask").style.display = "none"; }

        async function saveClothes(){
            var id = document.getElementById("editId").value;
            var clothName = document.getElementById("clothName").value.trim();
            var typeId = document.getElementById("dialogType").value;
            var style = document.getElementById("dialogStyle").value.trim();
            var price = document.getElementById("clothPrice").value;
            var image = document.getElementById("imgName").value;
            if(!clothName || !typeId || !style || !price){ alert("名称、类别、风格、价格不能为空"); return; }
            var data = {clothName:clothName, typeId:typeId, style:style, price:price, image:image};
            var url;
            if(id){ data.id = Number(id); url = "/editClothes"; }
            else { url = "/addClothes"; }
            var res = await request.post(url, data);
            if(res.code===200){ alert(res.data); closeDialog(); loadClothes(); }
            else { alert(res.msg); }
        }

        async function delCloth(id){
            if(!confirm("确定下架删除该服装？")) return;
            var res = await request.post("/delClothes", {id:id});
            if(res.code===200){ alert(res.data); loadClothes(); }
            else { alert(res.msg); }
        }

        function resetSearch(){ document.getElementById("searchName").value = ""; document.getElementById("typeSel").value = ""; loadClothes(); }
        function openImg(src){ document.getElementById("bigImg").src = src; document.getElementById("imgMask").style.display = "flex"; }
        function closeImg(){ document.getElementById("imgMask").style.display = "none"; }
        function jump(page){ location.href = "./" + page; }
        function logout(){ localStorage.clear(); location.href = "./adminLogin.html"; }
    </script>

    <script>
        (function(){
            var c = document.getElementById('canvas-container');
            var scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x05070a, 0.001);
            var camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            c.appendChild(renderer.domElement);
            var geo = new THREE.BufferGeometry();
            var n = 1500, arr = new Float32Array(n * 3);
            for(var i = 0; i < n * 3; i++) arr[i] = (Math.random() - 0.5) * 100;
            geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
            var stars = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.08, color: 0xffffff, transparent: true, opacity: 0.5 }));
            scene.add(stars);
            function animate() { requestAnimationFrame(animate); stars.rotation.y -= 0.0002; renderer.render(scene, camera); }
            animate();
            window.addEventListener('resize', function(){
                camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
